<!doctype html>
<html lang="{{ .Site.Language.Lang }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {{ if .IsHome }}
        {{ .Site.Title }}
      {{ else }}
        {{ .Title }} &middot;
        {{ .Site.Title }}
      {{ end }}
    </title>
    {{ with .Description }}
      <meta name="description" content="{{ . }}" />
    {{ end }}
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Nata+Sans:wght@400;500;700&display=swap"
    />
    {{ $style := resources.Get "css/style.css" | minify | fingerprint }}
    <link
      rel="stylesheet"
      href="{{ $style.RelPermalink }}"
      integrity="{{ $style.Data.Integrity }}"
    />
  </head>
  <body>
    <header>
      <a href="{{ "/" | relURL }}" class="site-title">{{ .Site.Title }}</a>
      <nav class="site-nav">
        <a href="{{ "/notices/" | relURL }}">Notices</a>
        <a href="{{ "/minutes/" | relURL }}">Minutes</a>
        <a href="{{ "/news/" | relURL }}">News</a>
        <a href="{{ "/governance/" | relURL }}">Governance</a>
      </nav>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer>
      <p>
        &copy;
        2022&ndash;{{ now.Year }}
        C&amp;RBGC. All rights reserved.
      </p>
    </footer>
  </body>
</html>
